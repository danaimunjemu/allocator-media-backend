databaseChangeLog:

  # ═══════════════════════════════════════════════════════════════════════════
  # Migration 012 — Email Verification & Password Reset
  # Adds users.email_verified plus email_verification_tokens / password_reset_tokens
  # tables for the self-service reader signup flow. Guarded with preConditions so
  # it's a no-op where hibernate.ddl-auto already created these.
  # ═══════════════════════════════════════════════════════════════════════════

  - changeSet:
      id: 012-01-add-email-verified
      author: allocator
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: users
            columnName: email_verified
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: email_verified
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

  - changeSet:
      id: 012-02-create-email-verification-tokens
      author: allocator
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: email_verification_tokens
      changes:
        - createTable:
            tableName: email_verification_tokens
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_email_verification_tokens_user
                    references: users(id)
              - column:
                  name: token
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: expiry_date
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: used
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
                  defaultValueComputed: now()
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
                  defaultValueComputed: now()
        - createIndex:
            indexName: idx_email_verification_token
            tableName: email_verification_tokens
            columns:
              - column:
                  name: token

  - changeSet:
      id: 012-03-create-password-reset-tokens
      author: allocator
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: password_reset_tokens
      changes:
        - createTable:
            tableName: password_reset_tokens
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_password_reset_tokens_user
                    references: users(id)
              - column:
                  name: token
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: expiry_date
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: used
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
                  defaultValueComputed: now()
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
                  defaultValueComputed: now()
        - createIndex:
            indexName: idx_password_reset_token
            tableName: password_reset_tokens
            columns:
              - column:
                  name: token
