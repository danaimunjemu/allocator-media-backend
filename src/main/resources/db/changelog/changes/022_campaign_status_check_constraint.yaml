databaseChangeLog:

  # ═══════════════════════════════════════════════════════════════════════════
  # Migration 022 — Fix stale campaigns.status check constraint
  # `campaigns_status_check` was auto-generated by Hibernate's ddl-auto:update
  # back when CampaignStatus only had DRAFT/SENDING/SENT. Hibernate never
  # retroactively widens an existing check constraint when the entity's enum
  # grows, so it silently kept rejecting the newsletter workflow's newer
  # values (IN_REVIEW, SCHEDULED, FAILED) with a 500 at submit-review/approve/
  # send time. Replaced with a constraint matching the full current enum.
  # ═══════════════════════════════════════════════════════════════════════════

  - changeSet:
      id: 022-01
      author: system
      changes:
        - sql:
            sql: ALTER TABLE campaigns DROP CONSTRAINT IF EXISTS campaigns_status_check
        - sql:
            sql: >
              ALTER TABLE campaigns ADD CONSTRAINT campaigns_status_check
              CHECK (status IN ('DRAFT', 'IN_REVIEW', 'SCHEDULED', 'SENDING', 'SENT', 'FAILED'))
