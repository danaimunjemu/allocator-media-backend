services:
  - type: web
    name: allocator-backend-staging
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: staging
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://ep-small-hat-ava4mzt3-pooler.c-11.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: MEDIA_LOCAL_BASE_URL
        value: https://allocator-backend-staging.onrender.com/media-service/api/v1/media/files
      - key: APP_PUBLIC_API_URL
        value: https://allocator-backend-staging.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        value: sandbox.smtp.mailtrap.io
      - key: SMTP_PORT
        value: 587
      - key: SMTP_AUTH
        value: true
      - key: SMTP_STARTTLS
        value: true
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MAILCHIMP_API_KEY
        sync: false
      - key: MANSA_API_KEY
        sync: false

  - type: web
    name: allocator-backend-prod
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://ep-misty-violet-avy8q9mq-pooler.c-11.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: MEDIA_LOCAL_BASE_URL
        value: https://allocator-backend-prod.onrender.com/media-service/api/v1/media/files
      - key: APP_PUBLIC_API_URL
        value: https://allocator-backend-prod.onrender.com
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MAILCHIMP_API_KEY
        sync: false
      - key: MANSA_API_KEY
        sync: false
